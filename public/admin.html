<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin SMM</title><link rel="stylesheet" href="/style.css"></head><body><div class="wrap"><div class="nav"><div class="brand">Admin SMM Pro</div><a href="/">Loja</a></div>
<section id="loginBox" class="card"><h2>Login admin</h2><input id="email" placeholder="E-mail admin"><input id="pass" type="password" placeholder="Senha"><button class="btn" onclick="loginAdmin()">Entrar</button><div id="msg" class="msg"></div></section>
<section id="panel" class="hidden"><div class="tabs"><button class="pill" onclick="loadAll()">Dashboard</button><button class="pill" onclick="importServices()">Importar serviços</button><button class="pill" onclick="logoutAdmin()">Sair</button></div><div id="stats" class="grid"></div><div class="grid2"><div class="card"><h2>Depósitos pendentes</h2><div id="deposits"></div></div><div class="card"><h2>Adicionar saldo manual</h2><input id="userId" placeholder="ID do cliente"><input id="amount" type="number" placeholder="Valor + ou -"><input id="desc" placeholder="Descrição"><button class="btn" onclick="adjustBalance()">Aplicar</button></div></div><div class="card"><h2>Usuários</h2><div id="users"></div></div><div class="card"><h2>Pedidos recentes</h2><div id="orders"></div></div><div id="adminMsg" class="msg"></div></section>
</div><script src="/admin.js"></script></body></html>
